<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire — Elevia Nutrition</title>
<meta name="description" content="Remplis ton questionnaire nutritionnel personnalisé. Toutes tes réponses restent confidentielles.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════ */
:root {
  --navy: #0E1E2E; --navy-deep: #091520; --navy-light: #152A3D;
  --gold: #C6A05B; --gold-light: #D4B878; --gold-pale: #E8D5A8;
  --gold-glow: rgba(198,160,91,0.15);
  --cream: #F6F3EE; --cream-dark: #EDE8E0; --white: #FFFFFF;
  --text-dark: #1A1A1A; --text-muted: #6B7280; --text-soft: #8B9AAC;
  --border-soft: #F5EEE1;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Outfit', -apple-system, sans-serif;
  --header-h: 72px;
  --error: #C45B5B;
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; overflow-x: clip; }
body {
  font-family: var(--sans); font-weight: 300; color: var(--text-dark);
  background: var(--cream); line-height: 1.8; overflow-x: clip;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  min-height: 100dvh;
}
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; }
input, select, textarea { font-family: inherit; }

/* ═══════════════════════════════════════
   GRAIN OVERLAY
═══════════════════════════════════════ */
.grain { display: none; }

/* ═══════════════════════════════════════
   HEADER (minimal for questionnaire)
═══════════════════════════════════════ */
.site-header {
  position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h);
  z-index: 1002; display: flex; align-items: center; justify-content: center;
  padding: 0 clamp(1.5rem, 4vw, 4rem);
  background: var(--navy);
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.header-logo { width: 130px; height: auto; opacity: 0.9; }

/* ═══════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════ */
.progress-wrap {
  position: fixed; top: var(--header-h); left: 0; width: 100%;
  height: 3px; background: var(--cream-dark); z-index: 1001;
}
.progress-bar {
  height: 100%; width: 0%; border-radius: 0 2px 2px 0;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative; overflow: hidden;
}
.progress-bar::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }

/* ═══════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════ */
.q-main {
  max-width: 640px; margin: 0 auto;
  padding: calc(var(--header-h) + 2rem) clamp(1.25rem, 4vw, 2rem) 4rem;
  min-height: 100dvh;
}

/* ═══════════════════════════════════════
   STEP INDICATOR
═══════════════════════════════════════ */
.step-indicator {
  font-family: var(--sans); font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold);
  margin-bottom: 0.6rem;
}
.step-icon {
  font-size: 2rem; margin-bottom: 0.4rem; display: block;
  animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes bounceIn {
  from { opacity: 0; transform: scale(0.5) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.step-encourage {
  font-family: var(--sans); font-size: 0.78rem; font-weight: 400;
  color: var(--gold); margin-bottom: 1.5rem; font-style: italic;
  opacity: 0; animation: fadeSlide 0.5s ease 0.2s forwards;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.progress-pct {
  position: fixed; top: var(--header-h); right: clamp(1rem, 3vw, 2rem);
  height: 3px; line-height: 3px; z-index: 1002;
  font-family: var(--sans); font-size: 0.65rem; font-weight: 500;
  color: var(--gold); padding: 4px 0 0;
}

/* ═══════════════════════════════════════
   STEP TITLE
═══════════════════════════════════════ */
.step-title {
  font-family: var(--serif); font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 400; color: var(--navy); margin-bottom: 2rem;
  line-height: 1.2;
}
.step-title em { font-style: italic; color: var(--gold); }

/* ═══════════════════════════════════════
   GLASS CARD
═══════════════════════════════════════ */
.step-card {
  background: var(--white);
  border: 1px solid var(--border-soft);
  border-radius: 20px; padding: clamp(1.5rem, 4vw, 2.5rem);
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════
   FORM FIELDS
═══════════════════════════════════════ */
.field-group { margin-bottom: 1.5rem; }
.field-group:last-child { margin-bottom: 0; }
.field-group.hidden { display: none; }

.field-label {
  display: block; font-size: 0.82rem; font-weight: 500;
  color: var(--navy); letter-spacing: 0.03em; margin-bottom: 0.5rem;
}
.field-label .req { color: var(--gold); margin-left: 2px; }

.field-help {
  font-size: 0.75rem; font-weight: 300; color: var(--text-muted);
  margin-bottom: 0.6rem; line-height: 1.6; font-style: italic;
}

/* Text / Number inputs */
.field-input {
  width: 100%; padding: 12px 16px;
  background: var(--white); border: 1px solid #D5D0C7;
  border-radius: 10px; font-family: var(--sans); font-size: 0.92rem;
  font-weight: 300; color: var(--text-dark); outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
  -webkit-appearance: none; appearance: none;
}
.field-input::placeholder { color: var(--text-muted); opacity: 0.6; }
.field-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(198,160,91,0.15);
}

/* Textarea */
textarea.field-input { resize: vertical; min-height: 120px; line-height: 1.7; }

/* Number input arrows removal */
input[type="number"].field-input::-webkit-inner-spin-button,
input[type="number"].field-input::-webkit-outer-spin-button {
  -webkit-appearance: none; margin: 0;
}
input[type="number"].field-input { -moz-appearance: textfield; }

/* ═══════════════════════════════════════
   RADIO CARDS
═══════════════════════════════════════ */
.radio-group { display: flex; flex-direction: column; gap: 0.5rem; }
.radio-card {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 12px 16px; border-radius: 12px;
  background: var(--white); border: 1px solid #D5D0C7;
  cursor: pointer; transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  position: relative;
}
.radio-card:hover { border-color: var(--gold-pale); background: rgba(198,160,91,0.04); }
.radio-card.selected {
  border-color: var(--gold); background: rgba(198,160,91,0.04);
}
.radio-card input { position: absolute; opacity: 0; width: 0; height: 0; }
.radio-dot {
  width: 18px; height: 18px; min-width: 18px; border-radius: 50%;
  border: 2px solid #D5D0C7; transition: border-color 0.3s, background 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.radio-card.selected .radio-dot {
  border-color: var(--gold); background: var(--gold);
}
.radio-dot::after {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--white); opacity: 0; transition: opacity 0.2s;
}
.radio-card.selected .radio-dot::after { opacity: 1; }
.radio-text { font-size: 0.88rem; font-weight: 300; color: var(--text-dark); line-height: 1.4; }

/* ═══════════════════════════════════════
   CHECKBOX CARDS
═══════════════════════════════════════ */
.checkbox-group { display: flex; flex-direction: column; gap: 0.5rem; }
.checkbox-card {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 12px 16px; border-radius: 12px;
  background: var(--white); border: 1px solid #D5D0C7;
  cursor: pointer; transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  position: relative;
}
.checkbox-card:hover { border-color: var(--gold-pale); background: rgba(198,160,91,0.04); }
.checkbox-card.selected {
  border-color: var(--gold); background: rgba(198,160,91,0.04);
}
.checkbox-card input { position: absolute; opacity: 0; width: 0; height: 0; }
.checkbox-box {
  width: 18px; height: 18px; min-width: 18px; border-radius: 5px;
  border: 2px solid #D5D0C7; transition: border-color 0.3s, background 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.checkbox-card.selected .checkbox-box {
  border-color: var(--gold); background: var(--gold);
}
.checkbox-box svg {
  width: 10px; height: 10px; stroke: var(--white); stroke-width: 3;
  fill: none; opacity: 0; transition: opacity 0.2s;
}
.checkbox-card.selected .checkbox-box svg { opacity: 1; }
.checkbox-text { font-size: 0.88rem; font-weight: 300; color: var(--text-dark); line-height: 1.4; }

/* ═══════════════════════════════════════
   SECTION DIVIDER (within step)
═══════════════════════════════════════ */
.field-section-title {
  font-family: var(--serif); font-size: 1.3rem; font-weight: 500;
  color: var(--navy); margin: 2rem 0 1rem;
  padding-top: 1.5rem; border-top: 1px solid var(--border-soft);
}
.field-section-title:first-child { margin-top: 0; padding-top: 0; border-top: none; }

.field-note {
  font-family: var(--sans); font-size: 0.82rem; font-weight: 300;
  color: var(--text-muted); line-height: 1.7;
  background: rgba(198,160,91,0.06); border-left: 3px solid var(--gold-pale);
  padding: 0.8rem 1rem; border-radius: 0 8px 8px 0;
  margin-bottom: 1.2rem;
}
.field-warning {
  font-family: var(--sans); font-size: 0.82rem; font-weight: 400;
  color: var(--error); line-height: 1.6;
  background: rgba(196,91,91,0.06); border-left: 3px solid var(--error);
  padding: 0.8rem 1rem; border-radius: 0 8px 8px 0;
  margin: 1rem 0;
}

/* ═══════════════════════════════════════
   ERROR STATES
═══════════════════════════════════════ */
.field-group.error .field-input {
  border-color: var(--error);
  box-shadow: 0 0 0 3px rgba(196,91,91,0.15);
}
.field-group.error .radio-group,
.field-group.error .checkbox-group {
  border-radius: 12px; outline: 2px solid var(--error);
  outline-offset: 4px;
}
.field-error {
  font-size: 0.72rem; color: var(--error); margin-top: 0.35rem;
  font-weight: 400; display: none;
}
.field-group.error .field-error { display: block; }

/* ═══════════════════════════════════════
   NAVIGATION BUTTONS
═══════════════════════════════════════ */
.step-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 2rem; gap: 1rem;
}
.btn-back {
  font-size: 0.85rem; font-weight: 400; color: var(--text-muted);
  background: none; padding: 0.6rem 0; transition: color 0.3s;
  letter-spacing: 0.03em;
}
.btn-back:hover { color: var(--navy); }

.btn-next, .btn-submit-final {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.85rem 2rem; border-radius: 100px;
  background: var(--gold); color: var(--navy);
  font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em;
  transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
  position: relative; overflow: hidden; margin-left: auto;
}
.btn-next::before, .btn-submit-final::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}
.btn-next:hover, .btn-submit-final:hover {
  background: var(--gold-light); transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(198,160,91,0.25);
}
.btn-next:hover::before, .btn-submit-final:hover::before { left: 100%; }
.btn-next:active, .btn-submit-final:active { transform: scale(0.97); }
.btn-next .arrow, .btn-submit-final .arrow { transition: transform 0.3s; }
.btn-next:hover .arrow { transform: translateX(3px); }

.btn-next:disabled, .btn-submit-final:disabled {
  opacity: 0.5; cursor: not-allowed; transform: none;
}
.btn-submit-final:disabled:hover { background: var(--gold); box-shadow: none; transform: none; }

/* ═══════════════════════════════════════
   LOADING SPINNER
═══════════════════════════════════════ */
.spinner {
  display: none; width: 18px; height: 18px; border: 2px solid rgba(14,30,46,0.2);
  border-top-color: var(--navy); border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-submit-final.loading .spinner { display: inline-block; }
.btn-submit-final.loading .btn-text { opacity: 0; }

/* ═══════════════════════════════════════
   ERROR SCREEN / SUCCESS
═══════════════════════════════════════ */
.error-screen, .success-screen {
  max-width: 500px; margin: 0 auto;
  padding: calc(var(--header-h) + 6rem) clamp(1.5rem, 4vw, 2rem) 4rem;
  text-align: center; min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.error-screen h1, .success-screen h1 {
  font-family: var(--serif); font-size: clamp(1.8rem, 4vw, 2.5rem);
  font-weight: 400; color: var(--navy); margin-bottom: 1rem; line-height: 1.3;
}
.error-screen p, .success-screen p {
  font-size: 0.95rem; color: var(--text-muted); line-height: 1.7;
}

/* Toast messages */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(196,91,91,0.95); color: var(--white); padding: 0.8rem 1.5rem;
  border-radius: 12px; font-size: 0.85rem; font-weight: 400;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 2000; opacity: 0;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
  max-width: 90vw; text-align: center;
}
.toast.toast-info { background: rgba(198,160,91,0.95); color: var(--navy); }
.toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ═══════════════════════════════════════
   REDUCED MOTION
═══════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important; scroll-behavior: auto !important;
  }
  .progress-bar::after { animation: none; }
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 768px) {
  :root { --header-h: 60px; }
  .site-header { height: 60px; }
  .header-logo { width: 95px; }
  .progress-wrap { top: 60px; }
}
@media (max-width: 480px) {
  .step-card { padding: 1.25rem; }
  .btn-next, .btn-submit-final { padding: 0.8rem 1.5rem; font-size: 0.82rem; }
}
.skip-link { position: absolute; top: -100%; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--navy); padding: 0.8rem 1.6rem; font-family: var(--sans); font-size: 0.85rem; font-weight: 500; border-radius: 0 0 8px 8px; text-decoration: none; z-index: 10001; transition: top 0.3s; }
.skip-link:focus { top: 0; }
</style>
</head>

.835938 -22.925781 12.8125 -22.253906 12.8125 -21.515625 C 12.8125 -18.773438 13.140625 -16.28125 13.796875 -14.03125 C 14.460938 -11.789062 15.414062 -9.878906 16.65625 -8.296875 C 17.894531 -6.722656 19.367188 -5.5 21.078125 -4.625 C 22.796875 -3.757812 24.707031 -3.328125 26.8125 -3.328125 C 29.03125 -3.328125 31.085938 -3.8125 32.984375 -4.78125 C 34.878906 -5.757812 36.828125 -7.359375 38.828125 -9.578125 Z M 28.234375 -28.71875 C 29.285156 -28.71875 30.128906 -28.742188 30.765625 -28.796875 C 31.398438 -28.847656 31.875 -28.953125 32.1875 -29.109375 C 32.507812 -29.265625 32.722656 -29.488281 32.828125 -29.78125 C 32.929688 -30.070312 32.984375 -30.453125 32.984375 -30.921875 C 32.984375 -33.347656 32.203125 -35.285156 30.640625 -36.734375 C 29.085938 -38.191406 26.96875 -38.921875 24.28125 -38.921875 C 18.582031 -38.921875 15.050781 -35.519531 13.6875 -28.71875 Z"/></g></g></g><g transform="matrix(1, 0, 0, 1, 192, 126)"><g fill="#f6f3ee"><g transform="translate(1.536492, 83.040763)"><path d="M 0.625 -48.84375 L 11.515625 -48.84375 L 23.03125 -11.65625 L 23.453125 -11.65625 L 34.890625 -48.84375 L 45.78125 -48.84375 L 30.140625 0.0625 L 16.265625 0.0625 Z"/></g><g transform="translate(43.896857, 83.040763)"><path d="M 4.109375 -48.84375 L 15.078125 -48.84375 L 15.078125 0 L 4.109375 0 Z"/></g><g transform="translate(57.575005, 83.040763)"><path d="M 31.40625 -11.296875 L 15.765625 -11.296875 L 12.28125 0 L 1.25 0 L 18.625 -48.84375 L 28.75 -48.84375 L 45.984375 0 L 34.953125 0 Z M 28.75 -19.609375 L 23.71875 -35.375 L 23.3125 -35.375 L 18.421875 -19.609375 Z"/></g></g></g>

<main id="main-content">
<!-- Progress -->
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-pct" id="progressPct"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Error screen (hidden by default) -->
<div class="error-screen" id="errorScreen" style="display:none;">
  <h1>Lien invalide</h1>
  <p>Vérifie ton email de confirmation.<br>Le lien contient les paramètres nécessaires pour accéder à ton questionnaire.</p>
</div>

<!-- Main questionnaire (hidden until params validated) -->
<div class="q-main" id="qMain" style="display:none;">
  <span class="step-icon" id="stepIcon"></span>
  <div class="step-indicator" id="stepIndicator"></div>
  <h2 class="step-title" id="stepTitle"></h2>
  <p class="step-encourage" id="stepEncourage"></p>
  <div class="step-card" id="stepCard"></div>
  <div class="step-nav">
    <button class="btn-back" id="btnBack" style="visibility:hidden;">&#8592; Retour</button>
    <button class="btn-next" id="btnNext">Suivant <span class="arrow">&#8594;</span></button>
    <button class="btn-submit-final" id="btnSubmit" style="display:none;">
      <span class="btn-text">Envoyer mes réponses</span>
      <span class="spinner"></span>
    </button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── URL params ──
  var params = new URLSearchParams(window.location.search);
  var ORDER_ID = params.get('order_id');
  var EMAIL = params.get('email');
  var SESSION_ID = params.get('session_id');

  // Accept either session_id OR (order_id + email)
  if (!SESSION_ID && (!ORDER_ID || !EMAIL)) {
    document.getElementById('errorScreen').style.display = '';
    return;
  }

  document.getElementById('qMain').style.display = '';

  // ── State ──
  var formData = {};
  var currentStep = 0;
  var STORAGE_KEY = 'elevia_questionnaire_' + (ORDER_ID || SESSION_ID);

  // Restore from localStorage
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) formData = JSON.parse(saved);
  } catch(e) {}

  function saveToStorage() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(formData)); } catch(e) {}
  }

  // ── Helpers ──
  function el(id) { return document.getElementById(id); }
  function qs(sel, parent) { return (parent || document).querySelector(sel); }
  function qsa(sel, parent) { return (parent || document).querySelectorAll(sel); }

  function showToast(msg, type) {
    var t = el('toast');
    t.textContent = msg;
    t.className = 'toast' + (type === 'info' ? ' toast-info' : '') + ' visible';
    setTimeout(function() { t.classList.remove('visible'); }, 4000);
  }

  // ── Conditional helpers ──
  function v(key) { return formData[key] || ''; }
  // Objectifs GAIN : muscle_gain (prise de masse) + recomposition — même protocole nutritionnel
  function isGainGoal() { return v('primary_goal') === 'muscle_gain' || v('primary_goal') === 'recomposition'; }
  function hasVal(key) { return !!formData[key]; }
  function arrIncludes(key, val) {
    var a = formData[key];
    return Array.isArray(a) && a.indexOf(val) !== -1;
  }
  function isLF() {
    return v('lactose_intolerance') === 'mild' || v('lactose_intolerance') === 'severe' || arrIncludes('food_exclusions', 'lactose');
  }

  // ── Step Definitions ──
  // Each step: { id, title, condition?, fields[] }
  // field: { name, type, label, required?, placeholder?, step?, help?, condition?, options[], optionsDynamic? }

  function getSteps() {
    var steps = [];

    // STEP 1: Toi
    steps.push({
      id: 'toi', title: 'Parle-moi de <em>toi</em>', icon: '\uD83D\uDC4B',
      fields: [
        { name: 'lastname', type: 'text', label: 'Nom', required: true, placeholder: 'Dumont' },
        { name: 'firstname', type: 'text', label: 'Prénom', required: true, placeholder: 'Lucas' },
        { name: 'gender', type: 'radio', label: 'Genre', required: true, options: [
          { label: 'Homme', value: 'M' }, { label: 'Femme', value: 'F' }
        ]},
        { name: 'age', type: 'number', label: 'Âge', required: true, placeholder: '32', min: 10, max: 99 },
        { name: 'weight_kg', type: 'number', label: 'Poids (kg)', required: true, placeholder: '82', min: 30, max: 250, help: 'Ton poids du matin, à jeun, c\'est parfait. Pas besoin d\'être au gramme près.' },
        { name: 'height_m', type: 'number', label: 'Taille (m)', required: true, placeholder: '1.78', step: '0.01', min: 1.20, max: 2.30 },
        { name: 'primary_goal', type: 'radio', label: 'Objectif principal', required: true, help: 'C\'est la base de tout. Ton plan sera calibré en fonction de cet objectif.', options: [
          { label: 'Perdre du poids', value: 'weight_loss' },
          { label: 'Maintien / rééquilibrage alimentaire', value: 'maintenance' },
          { label: 'Recomposition — muscler et affiner sans prendre de poids. Nécessite une activité sportive (ou de prévoir d\'en commencer une).', value: 'recomposition' },
          { label: 'Prise de masse — prendre du volume et du poids. Nécessite une activité sportive (ou de prévoir d\'en commencer une).', value: 'muscle_gain' }
        ]},
        { name: 'target_weight_kg', type: 'number', label: 'Poids cible (kg)', placeholder: '75', min: 30, max: 250, help: 'M\u00EAme approximatif, \u00E7a suffit. Si tu ne sais pas, laisse vide.', condition: function() { return v('primary_goal') === 'weight_loss' || v('primary_goal') === 'muscle_gain'; } },
        { name: '_warn_muscle_target', type: 'section', className: 'field-warning', label: 'Ton poids cible est inférieur ou égal à ton poids actuel. Pour la prise de masse, il doit être supérieur. Si tu veux te muscler sans prendre de poids, choisis « Recomposition » ci-dessus.', condition: function() {
          if (v('primary_goal') !== 'muscle_gain') return false;
          var w = parseFloat(formData['weight_kg'] || '');
          var t = parseFloat(formData['target_weight_kg'] || '');
          return !isNaN(w) && !isNaN(t) && t <= w;
        } },
        { name: '_warn_loss_target', type: 'section', className: 'field-warning', label: 'Ton poids cible est supérieur ou égal à ton poids actuel. Pour perdre du poids, il doit être inférieur. Si tu veux maintenir ton poids, choisis « Maintien » ci-dessus.', condition: function() {
          if (v('primary_goal') !== 'weight_loss') return false;
          var w = parseFloat(formData['weight_kg'] || '');
          var t = parseFloat(formData['target_weight_kg'] || '');
          return !isNaN(w) && !isNaN(t) && t >= w;
        } }
      ]
    });

    // STEP 2: Tes mesures
    steps.push({
      id: 'mesures', title: 'Tes <em>mesures</em>', icon: '\uD83D\uDCCF',
      fields: [
        { name: '_mesures_intro', type: 'section', className: 'field-note', label: 'Ces mesures sont 100 % facultatives. Si tu ne les as pas sous la main ou que tu ne sais pas comment les prendre, passe directement \u00E0 la suite \u2014 ton plan sera tout aussi pr\u00E9cis. Tu pourras toujours les compl\u00E9ter plus tard.' },
        { name: 'waist_cm', type: 'number', label: 'Tour de taille (cm)', placeholder: '85', min: 40, max: 200, help: 'Mesure au niveau du nombril, debout, sans serrer. Pas de m\u00E8tre ruban\u00A0? Passe \u00E0 la suite.' },
        { name: 'hip_cm', type: 'number', label: 'Tour de hanches (cm)', placeholder: '98', min: 40, max: 200, help: 'Au point le plus large des hanches. Facultatif.' },
        { name: 'body_fat_pct', type: 'number', label: 'Taux de masse grasse (%)', placeholder: '22', step: '0.1', min: 3, max: 60, help: 'Si tu as une balance connect\u00E9e ou un r\u00E9sultat r\u00E9cent, indique-le ici. Sinon, laisse vide.' }
      ]
    });

    // STEP 3: Ton activite
    steps.push({
      id: 'activite', title: 'Ton <em>activité</em>', icon: '\uD83C\uDFC3',
      fields: [
        { name: 'job_activity', type: 'radio', label: 'En dehors du sport, quel est ton niveau d\'activité physique au quotidien ?', required: true, options: [
          { label: 'Principalement assis(e) — Bureau, télétravail, étudiant, retraité. Tu passes la majorité de ta journée assis(e).', value: 'tres_sedentaire' },
          { label: 'Assis(e) avec déplacements — Bureau avec réunions, courses, ménage, promener le chien. Tu bouges régulièrement mais sans effort physique.', value: 'sedentaire' },
          { label: 'Debout et en mouvement — Serveur, vendeur, enseignant, aide-soignant. Tu es debout et actif(ve) une bonne partie de la journée.', value: 'moderement_actif' },
          { label: 'Travail physique — Maçon, déménageur, agriculteur, ouvrier. Port de charges ou effort soutenu au quotidien.', value: 'tres_actif' }
        ]},
        { name: 'has_physical_activity', type: 'radio', label: 'Pratiques-tu une activité sportive ?', required: true, options: [
          { label: 'Oui', value: 'yes' }, { label: 'Non', value: 'no' }
        ]},
        { name: 'activity_frequency', type: 'radio', label: 'Combien de séances par semaine ?', condition: function() { return v('has_physical_activity') === 'yes'; }, options: [
          { label: '1 à 2 séances/semaine', value: '1_2_seances' },
          { label: '3 à 4 séances/semaine', value: '3_4_seances' },
          { label: '5 à 6 séances/semaine', value: '5_6_seances' },
          { label: '7 séances ou plus/semaine', value: '7plus_seances' }
        ]},
        { name: 'activity_intensity', type: 'radio', label: 'À quel niveau pratiques-tu ton sport ?', condition: function() { return v('has_physical_activity') === 'yes'; }, options: [
          { label: 'Légère — Sport doux ou débutant. Marche, yoga, natation loisir. Ou : tu viens de commencer et tu apprends encore les mouvements.', value: 'legere' },
          { label: 'Modérée — Pratiquant régulier avec un bon niveau. Tu connais les mouvements, tu tiens les séances en entier. C\'est le niveau de la majorité des sportifs.', value: 'moderee' },
          { label: 'Élevée — Niveau avancé ou compétiteur. Tu maîtrises ton sport, entraînement structuré avec objectifs de performance.', value: 'elevee' }
        ]},
        { name: 'sport_prevu', type: 'radio', label: 'Prévois-tu de démarrer une activité sportive ?', help: 'Sans entraînement musculaire, la recomposition ou la prise de masse n\'est pas possible. Cette réponse adapte ton protocole.', condition: function() { return isGainGoal() && v('has_physical_activity') === 'no'; }, options: [
          { label: 'Oui, c\'est prévu', value: 'oui' },
          { label: 'Pas encore décidé', value: 'pas_encore' },
          { label: 'Non, pas pour l\'instant', value: 'non' }
        ]}
      ]
    });

    // STEP 4: Ton alimentation
    // ⚠️ AVANT muscle_gain pour que diet_profile soit disponible dans mg_legumineuses_mix
    steps.push({
      id: 'alimentation', title: 'Ton <em>alimentation</em>', icon: '\uD83E\uDD57',
      fields: [
        { name: 'diet_profile', type: 'radio', label: 'Profil alimentaire', required: true, options: [
          { label: 'Omnivore \u2014 je mange de tout', value: 'omnivore' },
          { label: 'Flexitarien \u2014 je réduis ma consommation de viande', value: 'flexitarian' },
          { label: 'Pesco-végétarien \u2014 pas de viande, mais poisson', value: 'pescetarian' },
          { label: 'Végétarien \u2014 ni viande, ni poisson', value: 'vegetarian' }
        ]},
        { name: 'eat_everything', type: 'radio', label: 'Manges-tu de tout ?', required: true, options: [
          { label: 'Oui, je mange de tout', value: 'yes' },
          { label: 'Pas tout, mais je suis prêt(e) à faire un effort', value: 'effort' },
          { label: 'Non, j\'ai des exclusions ou des aversions', value: 'exclusions' }
        ]},
        { name: 'food_exclusions', type: 'checkbox', label: 'Exclusions alimentaires', condition: function() { return v('eat_everything') === 'exclusions'; }, options: [
          { label: 'Produits contenant du lactose', value: 'lactose' },
          { label: 'Viandes', value: 'viandes' },
          { label: 'Aliments en provenance de la mer', value: 'mer' },
          { label: '\u0152ufs', value: 'oeufs' },
          { label: 'Fruits à coque', value: 'fruits_coque' },
          { label: 'Fromage', value: 'fromage' },
          { label: 'Légumineuses', value: 'legumineuses' }
        ]},
        { name: 'allergies', type: 'checkbox', label: 'Allergies', options: [
          { label: 'Aucune allergie', value: 'none' },
          { label: 'Arachides', value: 'peanuts' },
          { label: 'Fruits à coque', value: 'tree_nuts' },
          { label: 'Gluten', value: 'gluten' },
          { label: '\u0152ufs', value: 'eggs' },
          { label: 'Soja', value: 'soy' },
          { label: 'Crustacés / mollusques', value: 'shellfish' },
          { label: 'Autre', value: 'other' }
        ]},
        { name: 'allergies_other', type: 'text', label: 'Préciser l\'allergie', placeholder: 'Ex: sésame, moutarde...', condition: function() { return arrIncludes('allergies', 'other'); } },
        { name: 'lactose_intolerance', type: 'radio', label: 'Intolérance au lactose', options: [
          { label: 'Non, aucun souci', value: 'no' },
          { label: 'Oui, intolérance légère', value: 'mild' },
          { label: 'Oui, intolérance forte', value: 'severe' },
          { label: 'Je ne sais pas', value: 'unknown' }
        ]},
        { name: 'gluten_intolerance', type: 'radio', label: 'Intolérance au gluten', options: [
          { label: 'Non, aucun souci', value: 'no' },
          { label: 'Sensibilité légère', value: 'sensitive' },
          { label: 'Intolérance confirmée / c\u0153liaque', value: 'celiac' },
          { label: 'Je ne sais pas', value: 'unknown' }
        ]},
        // Végétarien block
        { name: 'veg_type', type: 'radio', label: 'Type de végétarisme', condition: function() { return v('diet_profile') === 'vegetarian'; }, options: [
          { label: 'Lacto-ovo', value: 'lacto_ovo' },
          { label: 'Lacto', value: 'lacto' },
          { label: 'Ovo', value: 'ovo' }
        ]},
        { name: 'veg_duration', type: 'radio', label: 'Depuis combien de temps ?', condition: function() { return v('diet_profile') === 'vegetarian'; }, options: [
          { label: 'Moins de 6 mois', value: 'lt_6m' },
          { label: '6 mois à 2 ans', value: '6m_2y' },
          { label: '2 à 5 ans', value: '2y_5y' },
          { label: 'Plus de 5 ans', value: 'gt_5y' }
        ]},
        { name: 'veg_protein_sources', type: 'checkbox', label: 'Sources de protéines végétales', condition: function() { return v('diet_profile') === 'vegetarian'; }, options: [
          { label: 'Légumineuses', value: 'legumes' },
          { label: 'Tofu', value: 'tofu' },
          { label: 'Tempeh', value: 'tempeh' },
          { label: 'Seitan', value: 'seitan' },
          { label: 'PST (prot\u00E9ines de soja textur\u00E9es)', value: 'pst' },
          { label: 'Quinoa / amarante', value: 'quinoa' },
          { label: 'Oléagineux', value: 'nuts' },
          { label: 'Aucune en particulier', value: 'none' }
        ]},
        { name: 'veg_soy_comfort', type: 'radio', label: 'À l\'aise avec le soja ?', condition: function() { return v('diet_profile') === 'vegetarian'; }, options: [

          { label: 'Oui, régulièrement', value: 'regular' },
          { label: 'Oui, de temps en temps', value: 'occasional' },
          { label: 'Non, vraiment pas mon truc', value: 'no' }
        ]},
        { name: 'dinner_alt_veg_ok', type: 'radio', label: 'Repas végétariens au repas chaud ?', required: true, condition: function() { return v('diet_profile') !== 'vegetarian' && !isGainGoal(); }, options: [
          { label: 'Non', value: 'no' },
          { label: '1x/semaine', value: '1x' },
          { label: '1 à 2x/semaine', value: '1_2x' },
          { label: '3x ou plus', value: '3_plus' }
        ]},
        { name: 'dinner_cheese_ok', type: 'radio', label: 'Fromage au repas chaud ?', required: true, condition: function() { return !arrIncludes('food_exclusions', 'fromage'); }, options: [
          { label: 'Oui', value: 'yes' }, { label: 'Non', value: 'no' }
        ]},
        { name: 'dinner_fish_pref', type: 'radio', label: 'Poisson ?', required: true, condition: function() { return v('diet_profile') !== 'vegetarian' && !arrIncludes('food_exclusions', 'mer'); }, options: [
          { label: 'J\'apprécie et c\'est dans mes moyens', value: 'yes' },
          { label: 'Pas vraiment, le minimum possible', value: 'no' }
        ]},

        // Toi et la nourriture
        { name: '_section_toi', type: 'section', label: 'Toi et la nourriture' },
        { name: '_section_toi_note', type: 'section', className: 'field-note', label: 'Ces questions sont libres et facultatives. Elles m\'aident \u00E0 mieux comprendre ton parcours et \u00E0 personnaliser ton accompagnement.' },
        { name: 'food_history_story', type: 'textarea', label: 'Ton parcours avec l\'alimentation jusqu\'à aujourd\'hui', placeholder: 'Raconte librement\u2026' },
        { name: 'current_food_difficulties', type: 'textarea', label: 'Tes principales difficultés alimentaires aujourd\'hui ?', placeholder: 'Ce qui te bloque\u2026' },
        { name: 'emotional_relationship_food', type: 'textarea', label: 'Ta relation à la nourriture ?', placeholder: 'Comment tu vis ça\u2026' },
        { name: 'expectations_from_plan', type: 'textarea', label: 'Qu\'attends-tu de ton plan et de cet accompagnement ?', placeholder: 'Tes attentes\u2026' }
      ]
    });

    return steps;
  }

  // ── Compute visible steps ──
  function getVisibleSteps() {
    var all = getSteps();
    var visible = [];
    for (var i = 0; i < all.length; i++) {
      if (!all[i].condition || all[i].condition()) {
        visible.push(all[i]);
      }
    }
    return visible;
  }

  function getVisibleFields(step) {
    var fields = [];
    for (var i = 0; i < step.fields.length; i++) {
      var f = step.fields[i];
      if (!f.condition || f.condition()) {
        fields.push(f);
      }
    }
    return fields;
  }

  // ── Render ──
  function renderStep() {
    var steps = getVisibleSteps();
    var totalSteps = steps.length;
    var step = steps[currentStep];
    if (!step) return;

    // Auto-set PDM defaults
    if (isGainGoal()) {
      if (!formData.has_breakfast || formData.has_breakfast === 'no') {
        formData.has_breakfast = 'yes';
        saveToStorage();
      }
      // Sync coldmeal_type_pref from PDM-specific field
      if (formData.coldmeal_type_pref_pdm) {
        formData.coldmeal_type_pref = formData.coldmeal_type_pref_pdm;
        saveToStorage();
      }
    }

    // Sync wants_snack → snack_time_choice for downstream compatibility (solver, SQL, admin)
    if (formData.wants_snack) {
      formData.snack_time_choice = formData.wants_snack === 'yes' ? 'flexible' : 'none';
      saveToStorage();
    }

    // Progress
    var pct = Math.round((currentStep + 1) / totalSteps * 100);
    el('progressBar').style.width = pct + '%';
    el('progressPct').textContent = pct + '%';
    el('stepIndicator').textContent = 'Étape ' + (currentStep + 1) + ' sur ' + totalSteps;
    el('stepIcon').textContent = step.icon || '';
    el('stepTitle').innerHTML = typeof step.title === 'function' ? step.title() : step.title;

    // Encouragement messages — personalized by goal
    var goal = v('primary_goal');
    var encourageMsg = '';

    if (!goal || currentStep === 0) {
      // Before goal selection or step 1
      var genericEnc = ['Faisons connaissance.', 'Chaque détail a son importance.'];
      encourageMsg = genericEnc[Math.min(currentStep, genericEnc.length - 1)];
    } else if (goal === 'weight_loss') {
      var pdpEnc = [
        'Chaque détail a son importance.',
        'On pose les fondations de ta transformation.',
        'Ton profil se précise.',
        'On affine ta stratégie.',
        'Chaque réponse rapproche ton plan de toi.',
        'On entre dans le concret.',
        'La ligne directrice est claire.',
        'On peaufine les détails.',
        'Derniers ajustements.',
        'On y est presque.'
      ];
      encourageMsg = pdpEnc[Math.min(currentStep - 1, pdpEnc.length - 1)];
    } else if (goal === 'maintenance') {
      var maintEnc = [
        'Chaque détail a son importance.',
        'On construit ton cadre alimentaire.',
        'Ton équilibre prend forme.',
        'On structure tes repères.',
        'Chaque choix nourrit ton plan.',
        'On affine ensemble.',
        'Le cadre est posé, on précise.',
        'On finalise ta routine.',
        'Dernière ligne droite.',
        'On y est presque.'
      ];
      encourageMsg = maintEnc[Math.min(currentStep - 1, maintEnc.length - 1)];
    } else if (goal === 'muscle_gain' || goal === 'recomposition') {
      var pdmEnc = [
        'Chaque détail a son importance.',
        'On pose les bases de ta progression.',
        'Ton plan de masse se construit.',
        'On calibre tes apports.',
        'La structure est là, on optimise.',
        'On ajuste chaque levier.',
        'Tes repas prennent forme.',
        'On verrouille les détails.',
        'Plus qu\'un effort, on boucle.',
        'On y est presque.'
      ];
      encourageMsg = pdmEnc[Math.min(currentStep - 1, pdmEnc.length - 1)];
    }

    // Végétarien bonus — after alimentation step
    if (v('diet_profile') === 'vegetarian' && step.id === 'alimentation') {
      encourageMsg = 'On veille à ce que ton plan végétarien soit complet, équilibré et sans compromis.';
    }

    el('stepEncourage').textContent = encourageMsg;

    // Buttons
    el('btnBack').style.visibility = currentStep === 0 ? 'hidden' : 'visible';
    var isLast = currentStep === totalSteps - 1;
    el('btnNext').style.display = isLast ? 'none' : '';
    el('btnSubmit').style.display = isLast ? '' : 'none';

    // Render fields
    var fields = getVisibleFields(step);
    var html = '';
    for (var i = 0; i < fields.length; i++) {
      html += renderField(fields[i]);
    }
    var card = el('stepCard');
    card.style.animation = 'none';
    card.offsetHeight; // force reflow
    card.style.animation = '';
    card.innerHTML = html;

    // Bind events
    bindFieldEvents();

    // Scroll to top only on step change (not on conditional re-render)
    if (!renderStep._skipScroll) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    renderStep._skipScroll = false;
  }

  function renderField(f) {
    if (f.type === 'section') {
      var cls = f.className || 'field-section-title';
      return '<div class="' + cls + '">' + escHtml(f.label) + '</div>';
    }

    var isReq = f.required;
    var reqHtml = isReq ? '<span class="req">*</span>' : '';
    var helpHtml = f.help ? '<p class="field-help">' + escHtml(f.help) + '</p>' : '';
    var errHtml = '<p class="field-error">Ce champ est requis.</p>';

    var out = '<div class="field-group" data-field="' + f.name + '">';
    out += '<label class="field-label">' + escHtml(f.label) + reqHtml + '</label>';
    out += helpHtml;

    if (f.type === 'text') {
      var val = v(f.name);
      out += '<input type="text" class="field-input" data-name="' + f.name + '" value="' + escAttr(val) + '" placeholder="' + escAttr(f.placeholder || '') + '">';
    } else if (f.type === 'number') {
      var val = v(f.name);
      var im = f.step ? 'decimal' : 'numeric';
      out += '<input type="number" class="field-input" data-name="' + f.name + '" value="' + escAttr(val) + '" placeholder="' + escAttr(f.placeholder || '') + '"' + (f.step ? ' step="' + f.step + '"' : '') + ' inputmode="' + im + '">';
    } else if (f.type === 'textarea') {
      var val = v(f.name);
      out += '<textarea class="field-input" data-name="' + f.name + '" placeholder="' + escAttr(f.placeholder || '') + '" rows="4">' + escHtml(val) + '</textarea>';
    } else if (f.type === 'radio') {
      out += '<div class="radio-group" data-name="' + f.name + '">';
      var current = v(f.name);
      for (var j = 0; j < f.options.length; j++) {
        var o = f.options[j];
        var sel = current === o.value ? ' selected' : '';
        out += '<label class="radio-card' + sel + '">';
        out += '<input type="radio" name="' + f.name + '" value="' + escAttr(o.value) + '"' + (sel ? ' checked' : '') + '>';
        out += '<span class="radio-dot"></span>';
        out += '<span class="radio-text">' + escHtml(o.label) + '</span>';
        out += '</label>';
      }
      out += '</div>';
    } else if (f.type === 'checkbox') {
      out += '<div class="checkbox-group" data-name="' + f.name + '">';
      var current = formData[f.name] || [];
      for (var j = 0; j < f.options.length; j++) {
        var o = f.options[j];
        var sel = current.indexOf(o.value) !== -1 ? ' selected' : '';
        out += '<label class="checkbox-card' + sel + '">';
        out += '<input type="checkbox" name="' + f.name + '" value="' + escAttr(o.value) + '"' + (sel ? ' checked' : '') + '>';
        out += '<span class="checkbox-box"><svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg></span>';
        out += '<span class="checkbox-text">' + escHtml(o.label) + '</span>';
        out += '</label>';
      }
      out += '</div>';
    }

    out += errHtml;
    out += '</div>';
    return out;
  }

  function escHtml(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  function escAttr(s) {
    if (!s && s !== 0) return '';
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Bind events ──
  function bindFieldEvents() {
    // Text/number inputs
    qsa('.field-input').forEach(function(inp) {
      var name = inp.getAttribute('data-name');
      if (!name) return;
      var weightFields = ['weight_kg', 'target_weight_kg'];
      inp.addEventListener('input', function() {
        formData[name] = inp.value;
        saveToStorage();
        clearError(name);
      });
      // Weight fields: re-render on blur (not input) to avoid dismissing mobile keyboard
      if (weightFields.indexOf(name) !== -1) {
        inp.addEventListener('blur', function() {
          renderStep._skipScroll = true;
          renderStep();
        });
      }
    });

    // Radio cards
    qsa('.radio-card').forEach(function(card) {
      card.addEventListener('click', function() {
        var input = card.querySelector('input[type="radio"]');
        if (!input) return;
        var name = input.name;
        var val = input.value;
        formData[name] = val;
        saveToStorage();
        clearError(name);

        // Update visual state
        var group = card.closest('.radio-group');
        group.querySelectorAll('.radio-card').forEach(function(c) { c.classList.remove('selected'); });
        card.classList.add('selected');
        input.checked = true;

        // Re-render step if conditionals may have changed
        var needsRerender = hasConditionalDependency(name);
        if (needsRerender) {
          setTimeout(function() { renderStep._skipScroll = true; renderStep(); clearHiddenFieldValues(); }, 50);
        }
      });
    });

    // Checkbox cards
    qsa('.checkbox-card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        e.preventDefault();
        var input = card.querySelector('input[type="checkbox"]');
        if (!input) return;
        var name = input.name;
        var val = input.value;

        if (!Array.isArray(formData[name])) formData[name] = [];

        var idx = formData[name].indexOf(val);
        if (idx !== -1) {
          formData[name].splice(idx, 1);
          card.classList.remove('selected');
          input.checked = false;
        } else {
          // "none/NONE" logic: if selecting none, clear others; if selecting other, clear none
          if (val === 'none' || val === 'NONE') {
            formData[name] = [val];
          } else {
            formData[name] = formData[name].filter(function(v) { return v !== 'none' && v !== 'NONE'; });
            formData[name].push(val);
          }
        }
        saveToStorage();
        clearError(name);

        // Refresh checkboxes visual state
        var group = card.closest('.checkbox-group');
        group.querySelectorAll('.checkbox-card').forEach(function(c) {
          var ci = c.querySelector('input[type="checkbox"]');
          var isSelected = formData[name].indexOf(ci.value) !== -1;
          c.classList.toggle('selected', isSelected);
          ci.checked = isSelected;
        });

        // Re-render if conditionals depend on this
        var needsRerender = hasConditionalDependency(name);
        if (needsRerender) {
          setTimeout(function() { renderStep._skipScroll = true; renderStep(); clearHiddenFieldValues(); }, 50);
        }
      });
    });
  }

  // Fields whose changes might trigger conditional re-render
  var conditionalTriggers = [
    'primary_goal', 'has_physical_activity', 'eat_everything', 'diet_profile',
    'alcohol_freq', 'coffee_quantity', 'coffee_sugar', 'coffee_milk',
    'sweet_beverages', 'light_beverages_freq', 'has_breakfast', 'include_breakfast', 'breakfast_variety',
    'breakfast_base_fixed', 'breakfast_base_varied', 'bread_sweet_type',
    'morning_light_snack', 'morning_snack_profile', 'spread_habit_global',
    'coldmeal_type_pref', 'coldmeal_type_pref_pdm', 'wants_snack',
    'allergies', 'food_exclusions', 'alcohol_planned', 'lactose_intolerance', 'type_milk'
  ];

  function hasConditionalDependency(name) {
    return conditionalTriggers.indexOf(name) !== -1;
  }

  function clearError(name) {
    var fg = qs('[data-field="' + name + '"]');
    if (fg) fg.classList.remove('error');
  }

  function setFieldError(fg, msg) {
    fg.classList.add('error');
    var errP = fg.querySelector('.field-error');
    if (errP) errP.textContent = msg;
  }

  // ── Validation ──
  function validateStep() {
    // Sync DOM values → formData (handles autofill / autocomplete that skip input events)
    qsa('.field-input').forEach(function(inp) {
      var name = inp.getAttribute('data-name');
      if (name) formData[name] = inp.value;
    });
    saveToStorage();

    var steps = getVisibleSteps();
    var step = steps[currentStep];
    var fields = getVisibleFields(step);
    var valid = true;
    var firstErrorField = null;

    for (var i = 0; i < fields.length; i++) {
      var f = fields[i];
      if (f.type === 'section') continue;

      var fg = qs('[data-field="' + f.name + '"]');
      if (!fg) continue;

      var val = formData[f.name];
      var empty = false;

      if (f.type === 'checkbox') {
        empty = !Array.isArray(val) || val.length === 0;
      } else {
        empty = !val || (typeof val === 'string' && val.trim() === '');
      }

      if (f.required && empty) {
        setFieldError(fg, 'Ce champ est requis.');
        valid = false;
        if (!firstErrorField) firstErrorField = fg;
      } else if (f.type === 'number' && !empty) {
        var numVal = parseFloat(val);
        if (isNaN(numVal) || (f.min !== undefined && numVal < f.min) || (f.max !== undefined && numVal > f.max)) {
          setFieldError(fg, 'Valeur attendue entre ' + f.min + ' et ' + f.max + '.');
          valid = false;
          if (!firstErrorField) firstErrorField = fg;
        } else {
          fg.classList.remove('error');
        }
      } else {
        fg.classList.remove('error');
      }
    }

    // Cross-field: muscle_gain + target ≤ weight
    if (step.id === 'toi' && formData['primary_goal'] === 'muscle_gain') {
      var w = parseFloat(formData['weight_kg'] || '');
      var t = parseFloat(formData['target_weight_kg'] || '');
      if (!isNaN(w) && !isNaN(t) && t <= w) {
        var tgtFg = qs('[data-field="target_weight_kg"]');
        if (tgtFg) {
          tgtFg.classList.add('error');
          if (!firstErrorField) firstErrorField = tgtFg;
        }
        valid = false;
        showToast('Prise de masse : ton poids cible doit être supérieur à ton poids actuel (' + w + ' kg). Sinon, choisis « Recomposition ».', 'info');
      }
    }

    // Cross-field: weight_loss + target ≥ weight
    if (step.id === 'toi' && formData['primary_goal'] === 'weight_loss') {
      var w2 = parseFloat(formData['weight_kg'] || '');
      var t2 = parseFloat(formData['target_weight_kg'] || '');
      if (!isNaN(w2) && !isNaN(t2) && t2 >= w2) {
        var tgtFg2 = qs('[data-field="target_weight_kg"]');
        if (tgtFg2) {
          tgtFg2.classList.add('error');
          if (!firstErrorField) firstErrorField = tgtFg2;
        }
        valid = false;
        showToast('Perte de poids : ton poids cible doit être inférieur à ton poids actuel (' + w2 + ' kg). Si tu veux maintenir ton poids, choisis « Maintien ».', 'info');
      }
    }

    // Cross-field: recomposition/muscle_gain + no sport + no plan
    if (step.id === 'activite' && (formData['primary_goal'] === 'recomposition' || formData['primary_goal'] === 'muscle_gain')) {
      if (formData['has_physical_activity'] === 'no' && formData['sport_prevu'] === 'non') {
        var spFg = qs('[data-field="sport_prevu"]');
        if (spFg) {
          spFg.classList.add('error');
          if (!firstErrorField) firstErrorField = spFg;
        }
        valid = false;
        var goalName = formData['primary_goal'] === 'recomposition' ? 'recomposition' : 'prise de masse';
        showToast('La ' + goalName + ' nécessite une activité sportive. Si tu ne comptes pas en commencer, choisis « Maintien » comme objectif.', 'info');
      }
    }

    if (!valid && firstErrorField) {
      firstErrorField.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    return valid;
  }

  // ── Navigation ──
  el('btnNext').addEventListener('click', function() {
    if (!validateStep()) return;
    var steps = getVisibleSteps();
    if (currentStep < steps.length - 1) {
      currentStep++;
      renderStep();
    }
  });

  el('btnBack').addEventListener('click', function() {
    if (currentStep > 0) {
      currentStep--;
      renderStep();
    }
  });

  // ── Clear hidden conditional fields before submit ──
  function clearHiddenFieldValues() {
    var allSteps = getSteps();
    for (var i = 0; i < allSteps.length; i++) {
      var step = allSteps[i];
      if (step.condition && !step.condition()) {
        for (var j = 0; j < step.fields.length; j++) {
          if (step.fields[j].name && step.fields[j].name.charAt(0) !== '_') {
            delete formData[step.fields[j].name];
          }
        }
        continue;
      }
      for (var j = 0; j < step.fields.length; j++) {
        var f = step.fields[j];
        if (f.condition && !f.condition() && f.name && f.name.charAt(0) !== '_') {
          delete formData[f.name];
        }
      }
    }
    saveToStorage();
  }

  // ── Submit ──
  el('btnSubmit').addEventListener('click', function() {
    if (!validateStep()) return;

    // Purge stale values from hidden conditional fields before sending
    clearHiddenFieldValues();

    var btn = el('btnSubmit');
    if (btn.classList.contains('loading')) return;
    btn.classList.add('loading');
    btn.disabled = true;

    var payload = { responses: Object.assign({}, formData) };
    if (SESSION_ID) {
      payload.session_id = SESSION_ID;
    } else {
      payload.order_id = ORDER_ID;
      payload.email = EMAIL;
    }

    fetch('https://rlemorqfkuloyxoydmdj.supabase.co/functions/v1/submit-questionnaire', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZW1vcnFma3Vsb3l4b3lkbWRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MzgwMTAsImV4cCI6MjA4NzIxNDAxMH0.5l_-bwLdDR745IsJCOJGDnIlnGp0fMDXxGlW93n5Ivg'
      },
      body: JSON.stringify(payload)
    })
    .then(function(res) {
      if (res.ok) {
        try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
        var rp = '/merci.html?completed=true';
        if (EMAIL) rp += '&email=' + encodeURIComponent(EMAIL);
        if (SESSION_ID) rp += '&session_id=' + encodeURIComponent(SESSION_ID);
        window.location.href = rp;
        return;
      }
      if (res.status === 409) {
        showToast('Questionnaire déjà envoyé. Tu ne peux le remplir qu\'une seule fois.', 'info');
        btn.classList.remove('loading');
        btn.disabled = false;
        return;
      }
      return res.text().then(function(t) { throw new Error(t || 'Erreur serveur (' + res.status + ')'); });
    })
    .catch(function(err) {
      showToast('Une erreur est survenue. Réessaie dans quelques instants.', 'error');
      btn.classList.remove('loading');
      btn.disabled = false;
    });
  });

  // ── Keyboard nav ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      var steps = getVisibleSteps();
      if (currentStep < steps.length - 1) {
        el('btnNext').click();
      } else {
        el('btnSubmit').click();
      }
    }
  });

  // ── Init ──
  renderStep();

  // ── Mobile — fermer le clavier au tap hors champ ──
  document.addEventListener('touchstart', function(e) {
    var active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
      if (!e.target.closest('input, textarea, select, label')) {
        active.blur();
      }
    }
  });

})();
</script>
